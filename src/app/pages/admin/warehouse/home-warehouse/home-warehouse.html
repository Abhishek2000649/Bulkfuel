


<div class="bg-gray-100">
  <div class="relative min-h-screen w-full px-4 md:px-12 py-10">
    <div class="max-w-[1400px] mx-auto">

      <!-- Loader -->
      <app-spinner [isLoading]="isLoading" [loaderSize]="100"></app-spinner>

      <!-- Header -->
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">

        <div>
          <h1 class="text-2xl md:text-5xl font-bold text-gray-900">
            All <span class="text-red-600">Warehouses</span>
          </h1>
        </div>

        <div class="flex items-center gap-4">

          <!-- Search -->
          <input
            type="text"
            placeholder="Find warehouse..."
            class="w-40 md:w-56 bg-white border border-gray-200 px-5 py-2 rounded-lg outline-none focus:ring-1 focus:ring-red-600 text-sm shadow-sm"
          />

          <!-- Add Button -->
          <a
            routerLink="/admin/warehouse/add"
            class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-lg shadow-lg flex items-center gap-2"
          >
            <span class="text-xl">+</span> Add Warehouse
          </a>

        </div>
      </div>

      <!-- GRID -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

        <!-- CARD -->
        <div
          *ngFor="let w of warehouses; trackBy: trackById"
          class="bg-white rounded-lg shadow-md hover:shadow-xl transition duration-300 overflow-hidden flex flex-col md:flex-row"
        >

          <!-- Image -->
          <div class="w-full md:w-1/3 p-4 flex items-center justify-center">
            <img
              src="https://picsum.photos/seed/{{w.id}}/400/300"
              class="w-full h-full object-cover rounded-lg"
            />
          </div>

          <!-- Content -->
          <div class="w-full md:w-2/3 p-4 flex flex-col flex-grow">

            <!-- ID -->
            <p class="text-sm text-yellow-500 text-end font-semibold mb-1">
              ID: {{ w.id }}
            </p>

            <!-- Name -->
            <h2 class="text-lg font-semibold text-gray-800 mb-2 hover:text-red-600 transition">
              {{ w.name }}
            </h2>

            <!-- Address -->
            <p class="text-sm text-gray-500 mb-1 flex items-center gap-2">
  
  <!-- SVG Location Icon -->
  <svg xmlns="http://www.w3.org/2000/svg"
       class="w-4 h-4 text-red-600"
       fill="none"
       viewBox="0 0 24 24"
       stroke="currentColor">

    <path stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0l-4.243-4.243a8 8 0 1111.314 0z" />

    <path stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />

  </svg>

  {{ w.address }}

</p>

            <!-- City / State -->
            <p class="text-sm text-gray-400 mb-2">
              {{ w.city }}, {{ w.state }} - {{ w.pincode }}
            </p>

            <!-- Date -->
            <p class="text-xs text-gray-400 mb-4">
              Created: {{ w.created_at | date:'dd MMM yyyy, hh:mm a' }}
            </p>

            <!-- Actions -->
            <div class="flex items-center justify-between mt-auto">

              <!-- Edit -->
              <a
                [routerLink]="['/admin/warehouse/edit', w.id]"
                class="px-4 py-2 text-sm font-medium bg-red-100 text-red-600 rounded-lg hover:bg-red-200 transition"
              >
                ✏️ Edit
              </a>

              <!-- Delete -->
              <button
                (click)="deleteWarehouse(w.id)"
                class="px-4 py-2 text-sm font-medium bg-red-500 text-white rounded-lg hover:bg-red-600 transition"
              >
                🗑 Delete
              </button>

            </div>

          </div>
        </div>

      </div>
      <!-- END GRID -->

    </div>
  </div>
</div>
