<div class="bg-gray-100">
  <div class="relative min-h-screen w-full px-4 md:px-12 py-10 selection:bg-amber-100">
    <div class="max-w-[1400px] mx-auto">
      <app-spinner [isLoading]="isLoading" [loaderSize]="100"></app-spinner>
      <div class="fixed top-28 right-12 z-[100] animate-pulse">
        <div
          *ngIf="successMessage"
          class="bg-[#1a0303] text-white px-6 py-3 rounded-2xl shadow-xl flex items-center gap-4 border border-white/10 backdrop-blur-md"
        >
          <div class="w-2 h-2 rounded-full bg-amber-400"></div>
          <p class="text-[10px] font-montserrat font-black uppercase tracking-widest">
            Category Added Successfully
          </p>
        </div>
      </div>

      <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
        <div>
          <h1 class="font-serif-premium text-2xl md:text-5xl text-gray-900 tracking-tighter">
            All <span class=" text-red-600">Categories</span>
          </h1>
        </div>

        <div class="flex items-center gap-4">
          <input
            type="text"
            placeholder="Find..."
            class="w-40 md:w-56 bg-white border border-gray-100 px-5 py-3 rounded-lg outline-none focus:ring-1 focus:ring-red-600 focus:border-red-600 transition-all text-xs font-medium shadow-sm"
          />

          <!-- <a
            routerLink="/admin/category/add"
            class="group flex items-center gap-3 px-6 py-3 bg-red-600 text-white rounded-lg shadow-lg hover:shadow-[#8B0000]/20 transition-all active:scale-95"
          >
            <span class="font-montserrat font-black uppercase tracking-widest text-[9px]">
              Add New
            </span>
            <div
              class="w-5 h-5 rounded-full bg-amber-400 flex items-center justify-center text-black"
            >
              +
            </div>
          </a> -->
          <a routerLink="/admin/category/add" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-lg shadow-lg flex items-center gap-2 flex justify-center items-center">
<span class="text-xl">+</span> Add New category
</a>
        </div>
      </div>

      <!-- ✅ CARD GRID VIEW -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Category Card -->
       <div
  *ngFor="let c of categories"
  class="bg-white rounded-lg shadow-md hover:shadow-xl transition duration-300 overflow-hidden flex flex-col md:flex-row"
>

  <!-- Image -->
  <div class=" w-full md:w-1/3 p-4  flex items-center justify-center">
    <img 
      [src]="'https://picsum.photos/seed/' + c.id + '/400/300'"
      class="w-full h-full  object-cover orverflow-hidden rounded-lg"
    />
  </div>

  <!-- Content -->
  <div class="w-full md:w-2/3 p-4 flex flex-col flex-grow">

    <!-- Category ID -->
    <p class="text-sm text-yellow-500 text-end  font-semibold mb-1">
       {{ c.id }}
    </p>

    <!-- Category Name -->
    <h2 class="text-lg font-semibold text-gray-800 mb-2 hover:text-red-600 transition">
      {{ c.name }}
    </h2>

    <!-- Created Date -->
    <p class="text-sm text-gray-500 mb-4">
      Created: {{ c.created_at | date:'dd MMM yyyy' }}
    </p>

    <!-- Buttons -->
   <div class="flex items-center  justify-between mt-auto">

  <!-- Edit -->
  <a
    [routerLink]="['/admin/category/edit', c.id]"
    class="px-4 py-2 text-sm font-medium bg-red-100 text-red-600 rounded-lg hover:bg-red-200 transition"
  >
    ✏️ Edit
  </a>

  <!-- Delete -->
  <button
    (click)="deleteCategory(c.id)"
    class="px-4 py-2 text-sm font-medium bg-red-500 text-white rounded-lg hover:bg-red-600 transition"
  >
    🗑 Delete
  </button>

</div>

  </div>
</div>
        
      </div>
      <!-- ✅ END GRID -->
    </div>
  </div>
</div>
