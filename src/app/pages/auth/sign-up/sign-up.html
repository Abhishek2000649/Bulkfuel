<div class="min-h-screen flex">

  <app-spinner [isLoading]="isLoading" [loaderSize]="100"></app-spinner>

  <!-- LEFT SIDE -->

  <div
    class="hidden lg:flex w-1/2 bg-gradient-to-br from-red-900 via-red-800 to-red-950 flex-col relative overflow-hidden">

    <div class="absolute top-0 left-0 w-[500px] h-[500px] bg-red-500 opacity-20 blur-[150px] rounded-full"></div>

    <div class="flex mt-24 ms-16 mb-6 relative z-10">

      <div class="relative group">

        <div class="absolute inset-0 bg-red-500 blur-xl opacity-40 rounded-2xl"></div>

        <div
          class="relative bg-gradient-to-br from-red-600 to-red-800 w-20 h-20 flex items-center justify-center rounded-2xl border border-white/20 shadow-2xl">

          <div class="w-16 h-16 flex justify-center items-center overflow-hidden rounded-lg">
            <img src="assets/images/logo-dark.png" class="w-full h-full object-contain">
          </div>

        </div>

      </div>

    </div>

    <p class="tracking-widest font-medium mt-10 ms-16 text-yellow-400 text-lg">
      SIGN UP
    </p>

    <h1 class="text-6xl mt-4 ms-16 font-bold tracking-wide text-yellow-200">
      AZIZI NEXUS
    </h1>

    <p class="tracking-[0.4em] ms-16 mt-3 text-yellow-300 text-sm">
      PREMIUM EDITION
    </p>

  </div>



  <!-- RIGHT SIDE -->

  <div class="lg:w-1/2 w-full lg:bg-red-100 bg-red-800 flex items-center justify-center py-6 px-2">

    <div class="lg:bg-gray-50 bg-red-50 w-full max-w-xl lg:max-w-lg p-6 rounded-3xl shadow-xl border border-gray-200">

      <!-- Title -->
      <div class="lg:hidden flex justify-center mb-6">

        <div class="relative group">

          <!-- Glow Effect -->
          <div class="absolute inset-0 bg-red-500 blur-xl opacity-40 rounded-2xl group-hover:opacity-70 transition">
          </div>

          <!-- Logo Box -->
          <div
            class="relative bg-gradient-to-br from-red-600 to-red-800 w-16 h-16 flex items-center justify-center rounded-2xl border border-white/20 shadow-xl backdrop-blur-xl transition-transform duration-300 group-hover:scale-105">

            <div class="w-12 h-12 flex justify-center items-center overflow-hidden rounded-lg">
              <img src="assets/images/logo-dark.png" class="w-full h-full object-contain">
            </div>

          </div>

        </div>

      </div>

      <h2 class="text-3xl font-semibold text-gray-800 text-center">
        Create Account
      </h2>

      <p class="text-gray-500 text-center mt-2 mb-6">
        Join Azizi Nexus and start your premium experience.
      </p>


      <!-- SOCIAL LOGIN -->

      <div class="flex gap-3 mb-6">

        <button class="flex items-center justify-center gap-2 border rounded-xl px-4 py-3 w-full hover:bg-gray-50">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5">
          Google
        </button>

        <button class="flex items-center justify-center gap-2 bg-black text-white rounded-xl px-4 py-3 w-full">

          <!-- Apple SVG Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">

            <path
              d="M16.365 1.43c0 1.14-.466 2.188-1.225 2.97-.78.806-2.057 1.43-3.17 1.343-.14-1.088.42-2.22 1.15-2.998.8-.843 2.13-1.45 3.245-1.315zM20.49 16.69c-.465 1.04-.69 1.5-1.29 2.42-.84 1.28-2.025 2.87-3.49 2.88-1.305.012-1.64-.84-3.41-.83-1.77.01-2.14.845-3.445.835-1.465-.01-2.585-1.44-3.425-2.72C2.71 17.17 1.6 13.32 3.42 10.37c.905-1.46 2.52-2.38 4.27-2.41 1.335-.026 2.6.905 3.41.905.81 0 2.33-1.12 3.93-.955.67.028 2.56.27 3.77 2.04-3.31 1.81-2.77 6.56 1.69 7.74z" />

          </svg>

          Apple

        </button>

      </div>


      <!-- Divider -->

      <div class="flex items-center mb-6">
        <div class="flex-grow border-t"></div>
        <span class="px-3 text-gray-400 text-sm">OR</span>
        <div class="flex-grow border-t"></div>
      </div>


      <form [formGroup]="registerForm" (ngSubmit)="register()">

        <!-- FULL NAME -->

        <label class="text-sm text-gray-500 tracking-wider">
          FULL NAME
        </label>

        <div
          class="group flex items-center border rounded-xl px-4 py-3 mt-2 mb-1 bg-gray-50 focus-within:ring-2 focus-within:ring-red-700 focus-within:text-red-700 text-gray-400">

          <!-- User SVG Icon -->
          <span class="mr-3 text-gray-400 group-focus-within:text-red-700">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="w-5 h-5">

              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6.75a3.75 3.75 0 11-7.5 0
               3.75 3.75 0 017.5 0z" />

              <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 20.25a8.25 8.25 0 0115 0" />
            </svg>
          </span>

          <input formControlName="name" type="text" placeholder="John Doe" class="w-full outline-none bg-transparent">

        </div>

        <p *ngIf="formErrors.name" class="text-xs text-red-600 font-semibold ml-1">
          {{ formErrors.name }}
        </p>


        <!-- EMAIL -->

        <label class="text-sm text-gray-500 tracking-wider mt-3 block">
          EMAIL ADDRESS
        </label>

        <div
          class="group flex items-center border rounded-xl px-4 py-3 mt-2 mb-1 bg-gray-50 focus-within:ring-2 focus-within:ring-red-700 focus-within:text-red-700 text-gray-400">

          <!-- Email SVG Icon -->
          <span class="mr-3 text-gray-400 group-focus-within:text-red-700">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="w-5 h-5">

              <path stroke-linecap="round" stroke-linejoin="round"
                d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25H4.5A2.25 2.25 0 012.25 17.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5H4.5A2.25 2.25 0 002.25 6.75m19.5 0v.243a2.25 2.25 0 01-1.07 1.912l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.905a2.25 2.25 0 01-1.07-1.912V6.75" />

            </svg>
          </span>

          <input formControlName="email" type="email" placeholder="john@example.com"
            class="w-full outline-none bg-transparent">

        </div>

        <p *ngIf="formErrors.email" class="text-xs text-red-600 font-semibold ml-1">
          {{ formErrors.email }}
        </p>

        <!-- TERMS -->

        <div class="mt-3 flex items-center mb-2">

          <input type="checkbox" formControlName="terms" class="mr-3 w-5 h-5 accent-red-500 cursor-pointer">

          <span class="text-gray-600 text-sm">
            I agree to Terms & Privacy Policy
          </span>

        </div>
        <p *ngIf="formErrors.terms" class="text-xs text-red-600 font-semibold ml-1 ">
          {{ formErrors.terms }}
        </p>


        <!-- BUTTON -->

        <button type="submit"
          class="w-full mt-6 bg-red-700 hover:bg-red-800 text-white py-3 rounded-xl font-semibold tracking-wide shadow-md">

          CREATE ACCOUNT

        </button>

      </form>


      <!-- LOGIN -->

      <p class="text-center text-gray-500 text-sm mt-6">

        Already have an account?

        <a routerLink="/login" class="text-orange-500 font-semibold">
          Sign In
        </a>

      </p>

    </div>

  </div>

</div>
