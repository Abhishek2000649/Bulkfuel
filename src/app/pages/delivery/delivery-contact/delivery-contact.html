<div class="relative flex flex-col h-[85vh] max-w-4xl mx-auto border rounded-xl shadow-lg overflow-hidden bg-gray-100">

  <!-- ✅ SPINNER -->
  <app-spinner [isLoading]="isLoading" [loaderSize]="80"></app-spinner>

  <!-- ================= HEADER ================= -->
  <div class="bg-red-500 text-white px-6 py-4 flex items-center justify-between">
    <h2 class="text-lg font-semibold">Support Chat</h2>
    <span class="text-sm opacity-80">User Panel</span>
  </div>

  <!-- ================= CHAT BODY ================= -->
  <div class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50 chat-body">

    <!-- EMPTY -->
    <div *ngIf="messages.length === 0 && !isLoading" class="text-center text-gray-400 mt-10">
      No messages yet. Start conversation 👋
    </div>

    <div *ngFor="let msg of messages">

      <!-- 🔴 USER MESSAGE (RIGHT) -->
      <div *ngIf="msg.sender_id === currentUserId" class="flex justify-end">
        <div class="bg-red-500 text-white px-4 py-2 rounded-lg max-w-xs shadow">
          <p class="text-sm break-words">{{ msg.message }}</p>
          <span class="text-[10px] opacity-70 block text-right mt-1">
            <span class="text-[10px] opacity-70 block text-right mt-1">
              {{ msg.created_at | date:'shortTime' }}

              <span class="ml-1">
                <!-- ✅ SEEN (Green Double Tick) -->
                <svg *ngIf="msg.is_seen" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                  fill="none" class="inline ml-1">

                  <path d="M1 13L5 17L13 9" stroke="blue" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
                  <path d="M8 13L12 17L20 9" stroke="blue" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />

                </svg>

                <!-- ❌ SENT (White Single Tick) -->
                <svg *ngIf="!msg.is_seen" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                  fill="none" class="inline ml-1">

                  <path d="M4 12L9 17L20 6" stroke="#ffffff" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
                </svg>
              </span>
            </span>
          </span>
        </div>
      </div>

      <!-- ⚪ ADMIN MESSAGE (LEFT) -->
      <div *ngIf="msg.sender_id !== currentUserId" class="flex justify-start">
        <div class="bg-white text-gray-800 px-4 py-2 rounded-lg max-w-xs shadow border">
          <p class="text-sm break-words">{{ msg.message }}</p>
          <span class="text-[10px] text-gray-400 block mt-1">
            {{ msg.created_at | date:'shortTime' }}
          </span>
        </div>
      </div>

    </div>

  </div>

  <!-- ================= INPUT ================= -->
  <div class="bg-white border-t p-3">

    <div class="flex items-center gap-2">
      <input type="text" [(ngModel)]="newMessage" placeholder="Type your message..."
        class="flex-1 px-4 py-2 border rounded-full focus:outline-none focus:ring-2 focus:ring-red-400"
        (keyup.enter)="sendMessage()" />

      <button (click)="sendMessage()" [disabled]="isLoading || !newMessage.trim()"
        class="bg-red-500 hover:bg-red-600 text-white px-5 py-2 rounded-full transition disabled:opacity-50">
        <span *ngIf="!isLoading">Send</span>
        <span *ngIf="isLoading">...</span>
      </button>
    </div>

    <!-- VALIDATION -->
    <p *ngIf="formErrors.message" class="text-red-500 text-xs mt-2 ml-2">
      {{ formErrors.message }}
    </p>

  </div>

</div>
